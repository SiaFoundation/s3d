name: S3 Compatibility Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tox
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0

      - name: Upgrade pip + install tox (v4)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "tox>=4"

      - name: Clone test repo
        run: |
          git clone https://github.com/SiaFoundation/s3-tests.git
          cd s3-tests && git checkout 3ce438b886778744412453149765fdadd2b3a773

      # warm up the tox env so the Go test's `tox --skip-pkg-install` is fast
      - name: Setup test suite (create envs only)
        run: tox run -vv --notest -c ./s3-tests

      - name: Run s3-tests
        env:
          S3_TESTS_DIR: ${{ github.workspace }}/s3-tests
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        run: go test -v -tags=tox -timeout 1h -run TestS3 ./tox/
